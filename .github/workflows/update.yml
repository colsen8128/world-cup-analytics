name: Update World Cup stats

# Runs once a day to refresh public/data.json from FBref.
# Pushing the updated file triggers a redeploy on Vercel/Netlify automatically;
# for GitHub Pages, see README for the companion deploy step.

on:
  schedule:
    - cron: "0 7 * * *"      # 07:00 UTC daily (~few hours after late ET matches). Adjust to taste.
  workflow_dispatch: {}        # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install soccerdata lxml html5lib pandas

      - name: Pull latest stats from FBref
        run: python fetch_fbref.py

      - name: Commit updated data
        run: |
          git config user.name "stats-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data.json
          git commit -m "Update stats $(date -u +%F)" || echo "No changes to commit"
          git push
