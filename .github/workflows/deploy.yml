name: Deploy to GitHub Pages

# Builds the Vite dashboard and publishes dist/ to GitHub Pages.
# Triggers on every push to main (including a data refresh pushed by
# ./refresh.sh) and on a manual run from the Actions tab.
#
# Note: data is refreshed locally via ./refresh.sh, not in CI — FBref blocks
# GitHub's datacenter IPs, so fetch_fbref.py must run from a residential IP.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # On a data-refresh trigger, only deploy if that run actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
